# OpenReplay - Session Replay
# NOTE: Requires >= 4GB RAM and significant disk space.
# This is a separate compose file for dedicated servers.
# Usage: docker compose -f docker/docker-compose.openreplay.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openreplay
      POSTGRES_USER: openreplay
      POSTGRES_PASSWORD: openreplay
    volumes:
      - openreplay_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openreplay"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - openreplay_redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - openreplay_minio_data:/data
    restart: unless-stopped

  backend:
    image: openreplay/openreplay:latest
    ports:
      - "9002:9002"
    environment:
      POSTGRES_STRING: postgres://openreplay:openreplay@postgres:5432/openreplay
      REDIS_STRING: redis://redis:6379
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: openreplay
      DOMAIN: localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: openreplay/frontend:latest
    ports:
      - "9003:9003"
    environment:
      DOMAIN: localhost
      BACKEND_URL: http://backend:9002
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  openreplay_db_data:
  openreplay_redis_data:
  openreplay_minio_data:
