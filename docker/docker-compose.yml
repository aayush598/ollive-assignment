services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llmchat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      service: "postgres"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/llmchat
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-this-in-production-min-32-chars}
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-nvidia}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-minimaxai/minimax-m2.7}
      QDRANT_URL: ${QDRANT_URL:-}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NODE_ENV: production
      LOG_LEVEL: info
      ENABLE_METRICS: "true"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    labels:
      service: "llm-inference-logger"

volumes:
  postgres_data:
