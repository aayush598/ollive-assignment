services:
  # === REVERSE PROXY ===
  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - grafana
      - uptime-kuma
    restart: unless-stopped

  # === APPLICATION ===
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/llmchat
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-this-in-production-min-32-chars}
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-nvidia}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-minimaxai/minimax-m2.7}
      NODE_ENV: production
      LOG_LEVEL: info
      ENABLE_METRICS: "true"
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_SERVICE_NAME: llm-inference-logger
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minio123}
      S3_BUCKET: uploads
      S3_REGION: us-east-1
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-xyz}
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: "8108"
      TYPESENSE_PROTOCOL: http
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      typesense:
        condition: service_started
    restart: unless-stopped
    labels:
      service: "llm-inference-logger"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llmchat}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      service: "postgres"

  # === CACHING ===
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # === LOGGING ===
  loki:
    image: grafana/loki:3.4.3
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # === METRICS ===
  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      - app
      - node-exporter
      - cadvisor
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    restart: unless-stopped

  # === TRACING ===
  tempo:
    image: grafana/tempo:2.7.1
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    user: root
    command:
      - "-config.file=/etc/tempo/config.yaml"
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/config.yaml:ro
      - tempo_data:/tmp/tempo
    restart: unless-stopped

  # === DASHBOARDS ===
  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

  # === ERROR TRACKING (GlitchTip - Open Source Sentry Alternative) ===
  glitchtip:
    image: glitchtip/glitchtip:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${GLITCHTIP_DATABASE_URL:-postgres://glitchtip:glitchtip@glitchtip-db:5432/glitchtip}
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-this-to-a-random-secret-key}
      EMAIL_URL: console://
      PORT: "8000"
      DEFAULT_FROM_EMAIL: glitchtip@example.com
      DJANGO_ALLOWED_HOSTS: localhost,glitchtip
    depends_on:
      glitchtip-db:
        condition: service_healthy
    restart: unless-stopped

  glitchtip-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD:-glitchtip}
    volumes:
      - glitchtip_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # === FRONTEND ANALYTICS (Umami) ===
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: ${UMAMI_DATABASE_URL:-postgres://umami:umami@umami-db:5432/umami}
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-change-this-to-a-random-secret}
    depends_on:
      umami-db:
        condition: service_healthy
    restart: unless-stopped

  umami-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami}
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # === UPTIME MONITORING ===
  uptime-kuma:
    image: louislam/uptime-kuma:1
    ports:
      - "3002:3001"
    volumes:
      - uptime_kuma_data:/app/data
    restart: unless-stopped

  # === SECURITY MONITORING ===
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    ports:
      - "8081:8080"
    environment:
      COLLECTIONS: "crowdsecurity/linux crowdsecurity/nginx crowdsecurity/http-cve"
      GID: "${GID-1000}"
      USE_WAL: "true"
    volumes:
      - crowdsec_data:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # crowdsec-bouncer disabled — image "crowdsecurity/firewall-bouncer" not found on Docker Hub
  # crowdsec-bouncer:
  #   image: crowdsecurity/cs-firewall-bouncer:latest
  #   environment:
  #     API_URL: http://crowdsec:8080
  #     API_KEY: ${CROWDSEC_API_KEY:-}
  #   depends_on:
  #     - crowdsec
  #   restart: unless-stopped

  # === FILE STORAGE (MinIO) ===
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # === FULL-TEXT SEARCH (Typesense) ===
  typesense:
    image: typesense/typesense:28.0
    ports:
      - "8108:8108"
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-xyz}
      TYPESENSE_DATA_DIR: /data
    volumes:
      - typesense_data:/data
    command: --data-dir /data --api-key xyz --enable-cors
    restart: unless-stopped

  # === SESSION REPLAY (OpenReplay - Heavy) ===
  # Note: OpenReplay requires significant resources.
  # Uncomment below only on dedicated servers with >= 4GB RAM.
  # See docker/docker-compose.openreplay.yml for the full setup.

volumes:
  postgres_data:
  redis_data:
  loki_data:
  prometheus_data:
  grafana_data:
  tempo_data:
  uptime_kuma_data:
  glitchtip_db_data:
  umami_db_data:
  crowdsec_data:
  crowdsec_config:
  caddy_data:
  caddy_config:
  minio_data:
  typesense_data:
