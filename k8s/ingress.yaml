apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-logger-ingress
  namespace: llm-inference-logger
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  rules:
    - host: llm-logger.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llm-logger-app
                port:
                  number: 3000
