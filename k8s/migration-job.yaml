apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: llm-inference-logger
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: llm-inference-logger:latest
          command: ["npx", "drizzle-kit", "push"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: llm-logger-secrets
                  key: database-url
            - name: NODE_ENV
              value: production
